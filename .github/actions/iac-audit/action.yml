name: IaC Compliance Audit
description: >
  Run the Claude IaC Compliance Audit against your infrastructure code.
  Scans Terraform, Kubernetes, Ansible, Packer, CI/CD pipelines, Dockerfiles, and more for
  PCI DSS v4.0, SOC 2 Type 2, GDPR, HIPAA, ISO 27001:2022, NIST CSF 2.0, NIST SP 800-53,
  CIS Controls v8, and OWASP Top 10 compliance gaps across 22 security domains.
  Uploads an HTML dashboard as an artifact and posts a summary to the
  GitHub Actions step summary.

author: Gokulnath Gopinath

inputs:
  anthropic-api-key:
    description: "Anthropic API key for the Claude Code CLI. Pass via secrets.ANTHROPIC_API_KEY in your workflow."
    required: true

  scan-path:
    description: "Path to scan (relative to repository root)"
    required: false
    default: "."

  mode:
    description: "Audit mode: static | live | all"
    required: false
    default: "static"

  framework:
    description: "Compliance framework: PCI-DSS | SOC2 | GDPR | HIPAA | ISO27001 | NIST-CSF | NIST-800-53 | CIS | OWASP | ALL"
    required: false
    default: "ALL"

  severity:
    description: "Minimum severity to report: CRITICAL | HIGH | ALL"
    required: false
    default: "ALL"

  fail-on:
    description: "Severity threshold for non-zero exit: CRITICAL | HIGH | MEDIUM | ALL | NONE"
    required: false
    default: "CRITICAL"

  output-format:
    description: "Report format: html | json | text"
    required: false
    default: "html"

  domain:
    description: "Specific domain(s) to audit: ALL or comma-separated list (01,04,09,21,22)"
    required: false
    default: "ALL"

  cloud:
    description: "Cloud provider for live mode: AWS | GCP | Azure | ALL"
    required: false
    default: "ALL"

  node-version:
    description: "Node.js version for installing Claude Code CLI"
    required: false
    default: "20"

outputs:
  critical:
    description: "Number of CRITICAL findings"
    value: ${{ steps.audit.outputs.critical }}

  high:
    description: "Number of HIGH findings"
    value: ${{ steps.audit.outputs.high }}

  medium:
    description: "Number of MEDIUM findings"
    value: ${{ steps.audit.outputs.medium }}

  low:
    description: "Number of LOW findings"
    value: ${{ steps.audit.outputs.low }}

  report-file:
    description: "Path to the generated report file"
    value: ${{ steps.audit.outputs.report-file }}

  exit-code:
    description: "0 = pass, 1 = findings at or above fail-on threshold"
    value: ${{ steps.audit.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Claude Code CLI
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
        claude --version

    - name: Install IaC Audit skill
      shell: bash
      run: |
        SKILL_DIR="$HOME/.claude/skills/iac-audit"
        mkdir -p "$SKILL_DIR"

        # Resolve action_path with realpath to strip any /./  or .. segments
        ACTION_DIR="$(realpath "${{ github.action_path }}" 2>/dev/null || echo "${{ github.action_path }}")"

        # Primary: repo root relative to action dir (works for both local and remote usage)
        REPO_ROOT="$(realpath "${ACTION_DIR}/../../.." 2>/dev/null || echo "${GITHUB_WORKSPACE}")"
        SKILL_SRC="${REPO_ROOT}/skills/iac-audit/SKILL.md"

        # Fallback: workspace root (same-repo usage when action_path resolution differs)
        if [[ ! -f "$SKILL_SRC" ]]; then
          SKILL_SRC="${GITHUB_WORKSPACE}/skills/iac-audit/SKILL.md"
        fi

        if [[ ! -f "$SKILL_SRC" ]]; then
          echo "::error::SKILL.md not found at ${SKILL_SRC}"
          echo "::error::Ensure the iac-compliance-audit repository is checked out and SKILL.md exists at skills/iac-audit/SKILL.md"
          exit 1
        fi

        cp "$SKILL_SRC" "$SKILL_DIR/SKILL.md"
        echo "Skill installed from: $SKILL_SRC"

    - name: Run IaC Compliance Audit
      id: audit
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        IAC_AUDIT_PATH: ${{ github.workspace }}/${{ inputs.scan-path }}
        IAC_AUDIT_MODE: ${{ inputs.mode }}
        IAC_AUDIT_FRAMEWORK: ${{ inputs.framework }}
        IAC_AUDIT_SEVERITY: ${{ inputs.severity }}
        IAC_AUDIT_OUTPUT: ${{ inputs.output-format }}
        IAC_AUDIT_FAIL_ON: ${{ inputs.fail-on }}
        IAC_AUDIT_REPORT_DIR: ${{ github.workspace }}/iac-audit-reports
        IAC_AUDIT_DOMAIN: ${{ inputs.domain }}
        IAC_AUDIT_CLOUD: ${{ inputs.cloud }}
        CI: "true"
      run: |
        # Skip gracefully if no API key is configured
        if [[ -z "${ANTHROPIC_API_KEY}" ]]; then
          echo "::warning::ANTHROPIC_API_KEY is not set — skipping IaC compliance audit."
          echo "::warning::Add ANTHROPIC_API_KEY as a repository secret to enable automatic auditing."
          echo "exit-code=0" >> "$GITHUB_OUTPUT"
          echo "critical=0" >> "$GITHUB_OUTPUT"
          echo "high=0"     >> "$GITHUB_OUTPUT"
          echo "medium=0"   >> "$GITHUB_OUTPUT"
          echo "low=0"      >> "$GITHUB_OUTPUT"
          exit 0
        fi

        ACTION_DIR="$(realpath "${{ github.action_path }}" 2>/dev/null || echo "${{ github.action_path }}")"
        REPO_ROOT="$(realpath "${ACTION_DIR}/../../.." 2>/dev/null || echo "${GITHUB_WORKSPACE}")"
        SCAN_SH="${REPO_ROOT}/ci/scan.sh"
        if [[ ! -f "$SCAN_SH" ]]; then
          SCAN_SH="${GITHUB_WORKSPACE}/ci/scan.sh"
        fi

        bash "$SCAN_SH" || EXIT=$?
        echo "exit-code=${EXIT:-0}" >> "$GITHUB_OUTPUT"

    - name: Upload audit report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: iac-audit-report-${{ github.run_number }}
        path: ${{ github.workspace }}/iac-audit-reports/
        retention-days: 30

    - name: Post PR comment with findings summary
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.0.1
      with:
        script: |
          const critical = '${{ steps.audit.outputs.critical }}' || '?';
          const high     = '${{ steps.audit.outputs.high }}'     || '?';
          const medium   = '${{ steps.audit.outputs.medium }}'   || '?';
          const low      = '${{ steps.audit.outputs.low }}'      || '?';
          const exitCode = '${{ steps.audit.outputs.exit-code }}';
          const status   = exitCode === '1' ? '❌ FAILED' : '✅ PASSED';
          const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

          const body = [
            `## IaC Compliance Audit — ${status}`,
            '',
            '| Severity | Count |',
            '|---|---|',
            `| 🔴 CRITICAL | **${critical}** |`,
            `| 🟠 HIGH | **${high}** |`,
            `| 🟡 MEDIUM | ${medium} |`,
            `| 🔵 LOW | ${low} |`,
            '',
            `[View full HTML report →](${runUrl}) *(download \`iac-audit-report-${context.runNumber}\` artifact)*`,
            '',
            exitCode === '1'
              ? `> ❌ Build gate triggered: findings at or above **${{ inputs.fail-on }}** severity found. Resolve CRITICAL and HIGH issues before merging.`
              : `> ✅ No findings at or above **${{ inputs.fail-on }}** severity. Safe to merge.`,
            '',
            '<details><summary>Frameworks checked: ${{ inputs.framework }}</summary>',
            '',
            'PCI DSS v4.0 · SOC 2 Type 2 · GDPR · HIPAA — 20 security domains',
            '',
            '</details>',
          ].join('\n');

          // Find and update existing comment, or create new one
          const marker = '## IaC Compliance Audit';
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.data.find(c => c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
